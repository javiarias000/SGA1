<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold
  {% if estado == 'NUEVA' %}bg-amber-100 text-amber-800{% endif %}
  {% if estado == 'VISTA' %}bg-blue-100 text-blue-700{% endif %}
  {% if estado == 'NOTIFICADA' %}bg-indigo-100 text-indigo-700{% endif %}
  {% if estado == 'RESUELTA' %}bg-green-100 text-green-700{% endif %}
">
  {% if estado == 'NUEVA' %}Nueva{% elif estado == 'VISTA' %}Vista{% elif estado == 'NOTIFICADA' %}Notificada{% else %}Resuelta{% endif %}
</span>
