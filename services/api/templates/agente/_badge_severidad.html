<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold
  {% if severidad == 'CRITICA' %}bg-red-100 text-red-700{% endif %}
  {% if severidad == 'ALTA' %}bg-orange-100 text-orange-700{% endif %}
  {% if severidad == 'MEDIA' %}bg-amber-100 text-amber-700{% endif %}
  {% if severidad == 'BAJA' %}bg-gray-100 text-gray-600{% endif %}
">
  {% if severidad == 'CRITICA' %}🔴{% elif severidad == 'ALTA' %}🟠{% elif severidad == 'MEDIA' %}🟡{% else %}⚪{% endif %}
  {{ severidad }}
</span>
