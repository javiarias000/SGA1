{% extends "teachers/base.html" %}
{% block title %}Registrar Préstamo{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:480px">
  <h3 class="fw-bold mb-4">📦 Registrar Préstamo — {{ instrumento.nombre }}</h3>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Estudiante</label>
          <select name="student_id" class="form-select" required>
            <option value="">Seleccionar...</option>
            {% for e in estudiantes %}<option value="{{ e.pk }}">{{ e.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Fecha de devolución esperada</label>
          <input name="fecha_devolucion_esperada" type="date" class="form-control" min="{{ fecha_min }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Observaciones</label>
          <textarea name="observaciones" class="form-control" rows="2"></textarea>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-warning">Registrar Préstamo</button>
          <a href="{% url 'inventario:detalle' instrumento.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
