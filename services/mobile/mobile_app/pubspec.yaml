name: mobile_app
description: "Conservatorio de Música Bolívar — App móvil SGA"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.2
  go_router: ^14.0.0
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^0.68.0
  file_picker: ^8.0.0+1
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
