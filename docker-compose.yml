services:
  # Django API Server
  web:
    build:
      context: .
      dockerfile: dockerfile
    restart: always
    command: gunicorn music_registry.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/usr/src/app/static
      - media_volume:/usr/src/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: dockerfile
    restart: always
    command: celery -A music_registry worker -l info
    volumes:
      - static_volume:/usr/src/app/static
      - media_volume:/usr/src/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: dockerfile
    restart: always
    command: celery -A music_registry beat -l info
    volumes:
      - static_volume:/usr/src/app/static
      - media_volume:/usr/src/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Flutter Web App (Served via Nginx)
  flutter_web:
    build:
      context: .
      dockerfile: flutter.Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web

  # Database
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-music_registry_db}
      POSTGRES_USER: ${DB_USER:-music_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-music_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-music_user} -d ${DB_NAME:-music_registry_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Broker
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_volume:
  media_volume:
