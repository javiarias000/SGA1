version: '3.8'

# ══════════════════════════════════════════════════════════════════════════════
# SGA1 — Sistema de Gestión Académica · Conservatorio Bolívar de Ambato
#
# Servicios:
#   api        → Django REST + GraphQL  (puerto 8000)
#   whatsapp   → Node.js / Google Sheets / Evolution API  (puerto 3001)
#   mobile     → Flutter web (puerto 80, vía nginx)
#   django_web → Panel web Django (puerto 8001, vía nginx)
#   db         → PostgreSQL
#   redis      → Broker Celery
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Infraestructura ─────────────────────────────────────────────────────────

  db:
    build:
      context: .
      dockerfile: infra/Dockerfile.db
    container_name: sga1_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-music_registry_db}
      POSTGRES_USER: ${DB_USER:-music_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-music_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/backups:/backups
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-music_user} -d ${DB_NAME:-music_registry_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sga1_network

  redis:
    image: redis:7-alpine
    container_name: sga1_redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sga1_network

  # ── Servicio API (Django) ────────────────────────────────────────────────────

  api:
    build:
      context: ./services/api
      dockerfile: ../../infra/Dockerfile.api
    container_name: sga1_api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --access-logfile - --error-logfile -"
    env_file:
      - .env
    environment:
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,api,sga1_api}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./services/api:/usr/src/app
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
      - logs_volume:/usr/src/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sga1_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Servicio WhatsApp (Node.js) ──────────────────────────────────────────────

  whatsapp:
    build:
      context: ./services/whatsapp
      dockerfile: Dockerfile
    container_name: sga1_whatsapp
    restart: unless-stopped
    env_file:
      - ./services/whatsapp/.env
    environment:
      - SGA1_BASE=http://api:8000
    volumes:
      - ./services/whatsapp:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sga1_network

  # ── Workers Celery ───────────────────────────────────────────────────────────

  celery_worker:
    build:
      context: ./services/api
      dockerfile: ../../infra/Dockerfile.api
    container_name: sga1_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./services/api:/usr/src/app
      - logs_volume:/usr/src/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sga1_network

  celery_beat:
    build:
      context: ./services/api
      dockerfile: ../../infra/Dockerfile.api
    container_name: sga1_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./services/api:/usr/src/app
      - logs_volume:/usr/src/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sga1_network

  # ── Frontends ───────────────────────────────────────────────────────────────

  mobile:
    build:
      context: ./services/api
      dockerfile: ../../infra/Dockerfile.frontend
      args:
        API_URL: http://localhost
    container_name: sga1_mobile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - sga1_network

  django_web:
    image: nginx:alpine
    container_name: sga1_django_web
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./infra/nginx/nginx_django.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - sga1_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  sga1_network:
    driver: bridge
