version: '3.8'

# Alternative version using separate .env files per service
# Use with: docker compose -f docker-compose.multi-env.yml up -d

services:
  # PostgreSQL Database
  db:
    build:
      context: .
      dockerfile: Dockerfile.database
    container_name: sga1_db
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sga1_network

  # Redis Broker
  redis:
    image: redis:7-alpine
    container_name: sga1_redis
    restart: unless-stopped
    env_file:
      - .env.redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly ${REDIS_APPENDONLY:-yes}
      --appendfsync ${REDIS_APPENDFSYNC:-everysec}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sga1_network

  # Django Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sga1_backend
    restart: unless-stopped
    env_file:
      - .env.backend
    command: |
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn music_registry.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --access-logfile - --error-logfile -"
    volumes:
      - ./:/usr/src/app
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
      - logs_volume:/usr/src/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sga1_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sga1_celery_worker
    restart: unless-stopped
    env_file:
      - .env.backend
    command: celery -A music_registry worker -l info --concurrency=4
    volumes:
      - ./:/usr/src/app
      - logs_volume:/usr/src/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sga1_network

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sga1_celery_beat
    restart: unless-stopped
    env_file:
      - .env.backend
    command: celery -A music_registry beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./:/usr/src/app
      - logs_volume:/usr/src/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sga1_network

  # Flutter Web Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sga1_frontend
    restart: unless-stopped
    env_file:
      - .env.frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - sga1_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  sga1_network:
    driver: bridge
